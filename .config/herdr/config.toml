onboarding = false
# herdr configuration
# Symlinked from ~/.config/herdr/config.toml (see link.sh)
#
# Custom "iceberg" color scheme, matching the palette already used for
# posting (.config/posting/themes/iceberg.yaml), based on cocopon/iceberg.vim.

[theme]
# tokyo-night is the closest built-in base (cool dark blue-gray) for any
# token not explicitly overridden below.
name = "tokyo-night"

[theme.custom]
panel_bg = "#161821"    # iceberg background
surface0 = "#1e2132"    # iceberg surface (cursor line / panels)
surface1 = "#272c42"    # iceberg selection background
# iceberg has no darker-than-background tone; interpolated from panel_bg.
surface_dim = "#0e0f15"
overlay0 = "#6b7089"    # iceberg comment gray
# iceberg has only one comment gray; interpolated midtone for a second overlay.
overlay1 = "#8b90a8"
text = "#c6c8d1"        # iceberg foreground
subtext0 = "#6b7089"    # iceberg comment gray
accent = "#89b8c2"      # iceberg cyan - matches posting's focus-highlight accent
red = "#e27878"
green = "#b4be82"
yellow = "#e2a478"
blue = "#84a0c6"
mauve = "#a093c7"       # iceberg magenta/violet
teal = "#89b8c2"        # iceberg has no separate teal; reuses cyan
peach = "#e9b189"       # iceberg bright yellow, to differ from yellow above

[ui]
# Accent color for highlights, borders, active-row emphasis, and navigation UI.
# This is the main lever for making the active space/agent stand out in the sidebar.
accent = "#89b8c2"

[ui.toast]
# Desktop notifications when an agent goes blocked (needs input) or done.
# Replaces the old Claude Code Stop/Notification hooks (osascript), which
# only covered Claude Code; this covers every agent herdr manages.
delivery = "system"
delay_seconds = 0

[keys]
prefix = "ctrl+a"
# goto (session navigator) moved off prefix+g to make room for the lazygit popup below.
goto = "prefix+alt+g"
# Moved off the default prefix+q to avoid accidental detach from a stray keypress.
detach = "prefix+ctrl+q"

[[keys.command]]
key = "ctrl+g"
type = "popup"
command = "lazygit"
description = "Open lazygit in a popup window"
width = "90%"
height = "90%"

[[keys.command]]
key = "ctrl+n"
type = "popup"
command = "${XDG_CONFIG_HOME:-$HOME/.config}/herdr/scripts/navi-clipboard.sh"
description = "Open navi cheatsheet in a popup window (copy & paste)"
width = "90%"
height = "90%"

[[keys.command]]
key = "ctrl+p"
type = "popup"
command = "zsh -c 'source $ZDOTDIR/.zshrc && ${XDG_CONFIG_HOME:-$HOME/.config}/herdr/scripts/ghq-project-switcher.sh'"
description = "Open ghq project switcher in a popup window"
width = "90%"
height = "90%"

[[keys.command]]
key = "prefix+d"
type = "popup"
command = "${XDG_CONFIG_HOME:-$HOME/.config}/herdr/scripts/docker-compose-status.sh"
description = "Open docker compose status in a popup window"
width = "90%"
height = "90%"

[[keys.command]]
key = "prefix+m"
type = "popup"
command = "btop"
description = "Open btop in a popup window"
width = "90%"
height = "90%"
