# Local override for herdr's Claude agent-detection manifest.
#
# Base copy of the remote manifest (version 2026.06.10.3, fetched from
# ~/.local/state/herdr/agent-detection/remote/claude.toml) plus one added
# rule: live_working_spinner.
#
# Why: osc_title_working (the only stock "working" rule) looks for a
# braille spinner glyph in the OSC terminal-title sequence. Current Claude
# Code (2.1.202) no longer writes a spinner there — only a plain task
# breadcrumb (e.g. "✳ some task summary") — so that rule never fires and
# working state is invisible (see upstream herdr issues #671/#673, which
# report the same regression and were closed as not reproducible on the
# maintainer's older Claude Code build). live_working_spinner instead reads
# the working indicator that Claude Code now renders in the screen body
# (token counters, "esc to interrupt").
#
# Caution: overrides here REPLACE the remote manifest wholesale (herdr does
# not merge them), so this file must be kept in sync with upstream fixes to
# claude.toml manually.
id = "claude"
version = "2026.06.10.3"
min_engine_version = 2
updated_at = "2026-06-10T00:00:00Z"
aliases = ["claude-code"]

[[rules]]
id = "osc_title_working"
state = "working"
priority = 1100
region = "osc_title"
visible_working = true
regex = ['^[\x{2800}-\x{28FF}] ']

[[rules]]
id = "transcript_viewer"
state = "unknown"
priority = 1000
region = "bottom_non_empty_lines(3)"
skip_state_update = true
contains = ["showing detailed transcript"]
any = [
  { contains = ["ctrl+o", "to toggle"] },
  { contains = ["ctrl+e", "show all"] },
  { contains = ["ctrl+e", "collapse"] },
  { contains = ["↑↓ scroll"] },
  { contains = ["? for shortcuts"] },
]

[[rules]]
id = "live_blocked_form"
state = "blocked"
priority = 980
region = "after_last_horizontal_rule"
visible_blocker = true
contains = ["enter to select", "esc to cancel"]
any = [
  { contains = ["tab/arrow keys to navigate"] },
  { contains = ["arrow keys to navigate"] },
  { contains = ["arrows to navigate"] },
  { contains = ["↑/↓ to navigate"] },
  { contains = ["↑↓ to navigate"] },
]

[[rules]]
id = "dynamic_workflow_prompt"
state = "blocked"
priority = 980
region = "whole_recent"
visible_blocker = true
contains = ["run a dynamic workflow?", "esc to cancel"]

[[rules]]
id = "live_working_spinner"
state = "working"
priority = 970
region = "whole_recent"
visible_working = true
any = [
  { line_regex = ['[↓↑]\s*[0-9][0-9.]*[kKmM]?\s*tokens'] },
  { contains = ["esc to interrupt"] },
]

[[rules]]
id = "live_prompt_box"
state = "idle"
priority = 950
region = "prompt_box_body"
visible_idle = true
line_regex = ['^\s*❯']
not = [
  { contains = ["enter to select"] },
  { contains = ["esc to cancel"] },
  { contains = ["tab/arrow keys"] },
  { contains = ["arrow keys to navigate"] },
  { contains = ["↑/↓ to navigate"] },
]

[[rules]]
id = "model_picker_menu"
state = "unknown"
priority = 900
region = "whole_recent"
skip_state_update = true
contains = ["select model", "enter to set as default", "esc to cancel"]
not = [
  { contains = ["do you want to proceed?"] },
  { contains = ["enter to select"] },
]

[[rules]]
id = "bash_permission_prompt"
state = "blocked"
priority = 850
region = "whole_recent"
visible_blocker = true
contains = ["do you want to proceed?"]
any = [
  { contains = ["bash command"] },
  { contains = ["bash("] },
  { contains = ["contains expansion"] },
  { contains = ["tab to amend"] },
  { contains = ["ctrl+e to explain"] },
]
all = [
  { any = [{ line_regex = ['(?i)^\s*❯?\s*yes\b'] }, { line_regex = ['(?i)^\s*1\.\s*yes\b'] }, { line_regex = ['(?i)^\s*2\.\s*no\b'] }] },
]

[[rules]]
id = "generic_permission_prompt"
state = "blocked"
priority = 840
region = "after_last_horizontal_rule"
visible_blocker = true
contains = ["do you want to proceed?", "esc to cancel"]
all = [
  { any = [
    { line_regex = ['(?i)^\s*❯?\s*1\.\s*yes\b'] },
    { line_regex = ['(?i)^\s*2\.\s*yes\b'] },
    { line_regex = ['(?i)^\s*2\.\s*no\b'] },
    { line_regex = ['(?i)^\s*3\.\s*no\b'] },
  ] },
]

[[rules]]
id = "legacy_no_prompt_blocker"
state = "blocked"
priority = 300
region = "whole_recent"
any = [
  { contains = ["do you want to"], any = [{ contains = ["yes"] }, { contains = ["❯"] }] },
  { contains = ["would you like to"], any = [{ contains = ["yes"] }, { contains = ["❯"] }] },
  { contains = ["waiting for permission"] },
  { contains = ["do you want to allow this connection?"] },
  { contains = ["tab to amend"] },
  { contains = ["ctrl+e to explain"] },
  { contains = ["do you want to proceed?", "esc to cancel"] },
  { contains = ["review your answers"] },
  { contains = ["skip interview and plan immediately"] },
]
not = [
  { regex = ['(?m)^\s*❯\s*$'] },
]

[[rules]]
id = "osc_title_idle"
state = "idle"
priority = 250
region = "osc_title"
visible_idle = true
regex = ['^\x{2733} ']

[[rules]]
id = "osc_progress_idle"
state = "idle"
priority = 250
region = "osc_progress"
regex = ['^4;0']
